name: Auto Run

on:
  push:
    branches:
      - master

  schedule:
    - cron: "0 23,1,3,5,7,9,11,13 * * *"

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Run main system
        run: python main.py